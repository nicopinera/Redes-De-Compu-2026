<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puerto1337 | Hello World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f9f7f2;
            --bg-2: #ece7db;
            --card: rgba(255, 255, 255, 0.78);
            --text: #23211d;
            --muted: #666055;
            --accent: #1d7c6b;
            --line: rgba(35, 33, 29, 0.14);
            --shadow: 0 16px 40px rgba(35, 33, 29, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1100px 600px at 10% 10%, rgba(29, 124, 107, 0.16), transparent 60%),
                radial-gradient(900px 500px at 90% 90%, rgba(197, 136, 62, 0.14), transparent 60%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
        }

        .card {
            width: min(760px, 100%);
            background: var(--card);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: clamp(24px, 4vw, 42px);
        }

        .tag {
            display: inline-block;
            border: 1px solid var(--line);
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 7px 12px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.4rem);
            line-height: 1.05;
        }

        h1 span {
            color: var(--accent);
        }

        p {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 1rem;
            max-width: 58ch;
        }

        h2 {
            margin: 28px 0 10px;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 700;
        }

        ul {
            margin: 0;
            padding: 0;
            list-style: none;
            border-top: 1px dashed var(--line);
        }

        li {
            padding: 12px 0;
            border-bottom: 1px dashed var(--line);
            font-size: 1rem;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        @media (max-width: 520px) {
            .card {
                border-radius: 16px;
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="tag">Redes de Computadoras 2026</div>
        <h1>Hola <span>Mundo</span></h1>
        <p>Presentacion del grupo <strong>Puerto1337</strong>.</p>

        <h2>Integrantes</h2>
        <ul>
            <li>Piñera Nicolas</li>
            <li>Krede Julian</li>
            <li>Arnaudo Federico</li>
            <li>Perotti Franco</li>
        </ul>
    </main>
</body>
</html>
